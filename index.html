<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            background-color: #05070f; 
            color: #f3f4f6; 
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        canvas { 
            background-color: #0b0f19; 
            border: 2px solid #1f2937; 
            border-radius: 12px; 
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15); 
            max-width: 100%;
            height: auto;
        }
        /* Custom Premium Intro Animations */
        @keyframes customFadeIn {
            0% { opacity: 0; transform: scale(0.95); filter: blur(4px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes customFadeOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.02); filter: blur(8px); }
        }
        .animate-intro-in { animation: customFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-intro-out { animation: customFadeOut 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 select-none overflow-hidden">

    <div id="splashScreen" class="fixed inset-0 bg-[#05070f] z-50 flex flex-col items-center justify-center space-y-6 px-4">
        
        <div id="companyBrand" class="opacity-0 flex flex-col items-center space-y-3">
            <img src="Logo.png" alt="Aethercore Interactive Logo" class="w-24 h-24 object-contain rounded-xl shadow-2xl tracking-wide">
            <h2 class="text-xs font-bold uppercase tracking-[0.4em] text-gray-500">Aethercore Interactive</h2>
        </div>

        <div id="gameBrand" class="opacity-0 hidden flex flex-col items-center">
            <h1 class="text-4xl font-black tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-500 uppercase">
                Sync Runner
            </h1>
            <div class="h-[2px] w-12 bg-indigo-500 mt-2 rounded-full shadow-[0_0_10px_#6366f1]"></div>
        </div>
    </div>

    <div id="appContent" class="opacity-0 w-full flex flex-col items-center my-auto space-y-6 max-w-xl transition-opacity duration-1000">
        
        <h1 class="text-xl font-black tracking-[0.3em] text-indigo-500 uppercase text-center">Sync Runner</h1>

        <div id="menu" class="w-full max-w-sm bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800/80 text-center space-y-4 shadow-2xl">
            <button id="createBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-transform shadow-lg shadow-indigo-600/20">Create Room</button>
            <div class="flex items-center my-2">
                <hr class="flex-grow border-gray-800">
                <span class="px-3 text-gray-600 text-xs tracking-widest">OR</span>
                <hr class="flex-grow border-gray-800">
            </div>
            <div class="flex flex-col gap-2.5">
                <input id="roomInput" type="text" pattern="[A-Za-z0-9]*" inputmode="text" placeholder="ENTER ROOM CODE" class="w-full bg-gray-950 border border-gray-800 px-4 py-3.5 rounded-xl focus:outline-none focus:border-indigo-500 text-center uppercase tracking-[0.2em] font-bold text-indigo-400 placeholder:text-gray-700">
                <button id="joinBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-transform shadow-lg shadow-emerald-600/20">Join Room</button>
            </div>
        </div>

        <div id="gameContainer" class="hidden flex flex-col items-center space-y-4 w-full">
            <div class="flex justify-between w-full bg-gray-900/40 border border-gray-800/60 px-4 py-3 rounded-xl text-xs tracking-wider">
                <div class="text-gray-400">ROOM: <span id="displayCode" class="font-bold text-indigo-400">----</span></div>
                <div id="statusText" class="text-gray-400 font-bold uppercase text-right">Waiting for players...</div>
            </div>

            <div class="w-full overflow-hidden">
                <canvas id="gameCanvas" width="800" height="250" class="w-full"></canvas>
            </div>

            <div class="w-full">
                <button id="readyBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black tracking-[0.15em] uppercase active:scale-95 transition-transform hidden shadow-lg shadow-indigo-600/20">TAP TO READY UP</button>
            </div>
            <p id="mobileHint" class="text-xs text-gray-500 hidden text-center tracking-widest uppercase animate-pulse">Tap screen to jump</p>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // Intro Sequence Animation Manager
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splashScreen');
            const company = document.getElementById('companyBrand');
            const gameTitle = document.getElementById('gameBrand');
            const mainApp = document.getElementById('appContent');

            // 1. Show Company Logo
            setTimeout(() => {
                company.classList.add('animate-intro-in');
            }, 300);

            // 2. Hide Company Logo
            setTimeout(() => {
                company.classList.remove('animate-intro-in');
                company.classList.add('animate-intro-out');
            }, 2200);

            // 3. Show Game Title
            setTimeout(() => {
                company.classList.add('hidden');
                gameTitle.classList.remove('hidden');
                gameTitle.classList.add('animate-intro-in');
            }, 3000);

            // 4. Hide Game Title & Reveal Main App smoothly
            setTimeout(() => {
                gameTitle.classList.remove('animate-intro-in');
                gameTitle.classList.add('animate-intro-out');
            }, 4900);

            setTimeout(() => {
                splash.classList.add('hidden');
                mainApp.classList.remove('opacity-0');
            }, 5600);
        });
    </script>
</body>
  </html>
