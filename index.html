<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Sync Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 select-none overflow-hidden">

    <div id="splashScreen" class="fixed inset-0 bg-[#05070f] z-50 flex flex-col items-center justify-center space-y-6 px-4">
        <div id="companyBrand" class="opacity-0 flex flex-col items-center space-y-3">
            <img src="../public/Logo.png" alt="Aethercore Interactive Logo" class="w-24 h-24 object-contain rounded-xl shadow-2xl">
            <h2 class="text-xs font-bold uppercase tracking-[0.4em] text-gray-500">Aethercore Interactive</h2>
        </div>
        <div id="gameBrand" class="opacity-0 hidden flex flex-col items-center">
            <h1 class="text-4xl font-black tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-500 uppercase">Sync Runner</h1>
            <div class="h-[2px] w-12 bg-indigo-500 mt-2 rounded-full shadow-[0_0_10px_#6366f1]"></div>
        </div>
    </div>

    <div id="appContent" class="hidden opacity-0 w-full flex flex-col items-center my-auto space-y-6 max-w-xl transition-opacity duration-1000">
        <h1 class="text-xl font-black tracking-[0.3em] text-indigo-500 uppercase text-center">Sync Runner</h1>

        <div id="modeMenu" class="w-full max-w-sm bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800/80 text-center space-y-4 shadow-2xl">
            <h2 class="text-sm font-bold tracking-widest text-gray-400 uppercase mb-2">Select Game Mode</h2>
            <button id="singleBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-all">Single Player</button>
            <button id="multiBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-all">Multiplayer (2 Players)</button>
        </div>

        <div id="menu" class="hidden w-full max-w-sm bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800/80 text-center space-y-4 shadow-2xl">
            <input id="nameInput" type="text" maxlength="12" placeholder="ENTER YOUR NAME" class="w-full bg-gray-950 border border-gray-800 px-4 py-3 rounded-xl focus:outline-none focus:border-indigo-500 text-center uppercase tracking-wider font-bold text-gray-200 placeholder:text-gray-600 mb-2">
            
            <button id="createBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-transform">Create Room</button>
            <div class="flex items-center my-2">
                <hr class="flex-grow border-gray-800">
                <span class="px-3 text-gray-600 text-xs tracking-widest">OR</span>
                <hr class="flex-grow border-gray-800">
            </div>
            <div class="flex flex-col gap-2.5">
                <input id="roomInput" type="text" placeholder="ENTER ROOM CODE" class="w-full bg-gray-950 border border-gray-800 px-4 py-3.5 rounded-xl focus:outline-none focus:border-indigo-500 text-center uppercase tracking-[0.2em] font-bold text-indigo-400">
                <button id="joinBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-transform">Join Room</button>
            </div>
        </div>

        <div id="gameContainer" class="hidden flex flex-col items-center space-y-4 w-full">
            <div class="flex justify-between w-full bg-gray-900/40 border border-gray-800/60 px-4 py-3 rounded-xl text-xs tracking-wider">
                <div id="roomDisplayArea" class="text-gray-400">ROOM: <span id="displayCode" class="font-bold text-indigo-400">----</span></div>
                <div id="statusText" class="text-gray-400 font-bold uppercase text-right">Waiting for players...</div>
            </div>
            <div class="w-full overflow-hidden">
                <canvas id="gameCanvas" width="800" height="250" class="w-full"></canvas>
            </div>
            <div class="w-full flex flex-col gap-3">
                <button id="readyBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black tracking-[0.15em] uppercase active:scale-95 transition-transform hidden">TAP TO READY UP</button>
                <button id="rematchBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-black tracking-[0.15em] uppercase active:scale-95 transition-transform hidden">REQUEST REMATCH</button>
                <button id="singleRestartBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black tracking-[0.15em] uppercase active:scale-95 transition-transform hidden">PLAY AGAIN</button>
            </div>
            <p id="mobileHint" class="text-xs text-gray-500 hidden text-center tracking-widest uppercase animate-pulse">Tap screen to jump</p>
        </div>
    </div>

    <script type="module" src="js/engine.js"></script>
</body>
</html>
