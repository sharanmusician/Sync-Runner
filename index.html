<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #05070f; 
            color: #f3f4f6; 
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        canvas { 
            background-color: #0b0f19; 
            border: 2px solid #1f2937; 
            border-radius: 12px; 
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15); 
            max-width: 100%;
            height: auto;
        }
        @keyframes customFadeIn {
            0% { opacity: 0; transform: scale(0.95); filter: blur(4px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes customFadeOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.02); filter: blur(8px); }
        }
        .animate-intro-in { animation: customFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-intro-out { animation: customFadeOut 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 select-none overflow-hidden">

    <div id="splashScreen" class="fixed inset-0 bg-[#05070f] z-50 flex flex-col items-center justify-center space-y-6 px-4">
        <div id="companyBrand" class="opacity-0 flex flex-col items-center space-y-3">
            <img src="Logo.png" alt="Aethercore Interactive Logo" class="w-24 h-24 object-contain rounded-xl shadow-2xl">
            <h2 class="text-xs font-bold uppercase tracking-[0.4em] text-gray-500">Aethercore Interactive</h2>
        </div>
        <div id="gameBrand" class="opacity-0 hidden flex flex-col items-center">
            <h1 class="text-4xl font-black tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-500 uppercase">Sync Runner</h1>
            <div class="h-[2px] w-12 bg-indigo-500 mt-2 rounded-full shadow-[0_0_10px_#6366f1]"></div>
        </div>
    </div>

    <div id="appContent" class="opacity-0 w-full flex flex-col items-center my-auto space-y-6 max-w-xl transition-opacity duration-1000">
        <h1 class="text-xl font-black tracking-[0.3em] text-indigo-500 uppercase text-center">Sync Runner</h1>

        <div id="menu" class="w-full max-w-sm bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800/80 text-center space-y-4 shadow-2xl">
            <input id="nameInput" type="text" maxlength="12" placeholder="ENTER YOUR NAME" class="w-full bg-gray-950 border border-gray-800 px-4 py-3 rounded-xl focus:outline-none focus:border-indigo-500 text-center uppercase tracking-wider font-bold text-gray-200 placeholder:text-gray-600 mb-2">
            
            <button id="createBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-transform">Create Room</button>
            <div class="flex items-center my-2">
                <hr class="flex-grow border-gray-800">
                <span class="px-3 text-gray-600 text-xs tracking-widest">OR</span>
                <hr class="flex-grow border-gray-800">
            </div>
            <div class="flex flex-col gap-2.5">
                <input id="roomInput" type="text" placeholder="ENTER ROOM CODE" class="w-full bg-gray-950 border border-gray-800 px-4 py-3.5 rounded-xl focus:outline-none focus:border-indigo-500 text-center uppercase tracking-[0.2em] font-bold text-indigo-400">
                <button id="joinBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl font-semibold tracking-wide active:scale-95 transition-transform">Join Room</button>
            </div>
        </div>

        <div id="gameContainer" class="hidden flex flex-col items-center space-y-4 w-full">
            <div class="flex justify-between w-full bg-gray-900/40 border border-gray-800/60 px-4 py-3 rounded-xl text-xs tracking-wider">
                <div class="text-gray-400">ROOM: <span id="displayCode" class="font-bold text-indigo-400">----</span></div>
                <div id="statusText" class="text-gray-400 font-bold uppercase text-right">Waiting for players...</div>
            </div>
            <div class="w-full overflow-hidden">
                <canvas id="gameCanvas" width="800" height="250" class="w-full"></canvas>
            </div>
            <div class="w-full flex flex-col gap-3">
                <button id="readyBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black tracking-[0.15em] uppercase active:scale-95 transition-transform hidden">TAP TO READY UP</button>
                <button id="rematchBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-black tracking-[0.15em] uppercase active:scale-95 transition-transform hidden">REQUEST REMATCH</button>
            </div>
            <p id="mobileHint" class="text-xs text-gray-500 hidden text-center tracking-widest uppercase animate-pulse">Tap screen to jump</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAmVSx7u_qETnBwlmiQkcfXmGNpiYCRxM",
            authDomain: "sync-runner.firebaseapp.com",
            databaseURL: "https://sync-runner-default-rtdb.firebaseio.com",
            projectId: "sync-runner",
            storageBucket: "sync-runner.firebasestorage.app",
            messagingSenderId: "824002855664",
            appId: "1:824002855664:web:bc6183f533d742bac97835",
            measurementId: "G-5HL2ZL9M5N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Core Game elements
        const menu = document.getElementById('menu');
        const gameContainer = document.getElementById('gameContainer');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const nameInput = document.getElementById('nameInput');
        const roomInput = document.getElementById('roomInput');
        const displayCode = document.getElementById('displayCode');
        const statusText = document.getElementById('statusText');
        const readyBtn = document.getElementById('readyBtn');
        const rematchBtn = document.getElementById('rematchBtn');
        const mobileHint = document.getElementById('mobileHint');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let roomCode = null;
        let myId = Math.random().toString(36).substring(2, 9);
        let players = {};
        let obstacleX = 800;
        let isGameRunning = false;
        let isHost = false;

        // Physics Configurations
        let myY = 200;
        let velocity = 0;
        const gravity = 0.65;
        const jumpStrength = -13;
        const groundY = 200;
        let myScore = 0;
        let myIsDead = false;

        // Intro Scene Sequencing logic
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splashScreen');
            const company = document.getElementById('companyBrand');
            const gameTitle = document.getElementById('gameBrand');
            const mainApp = document.getElementById('appContent');
            setTimeout(() => company.classList.add('animate-intro-in'), 300);
            setTimeout(() => { company.classList.remove('animate-intro-in'); company.classList.add('animate-intro-out'); }, 1800);
            setTimeout(() => { company.classList.add('hidden'); gameTitle.classList.remove('hidden'); gameTitle.classList.add('animate-intro-in'); }, 2500);
            setTimeout(() => { gameTitle.classList.remove('animate-intro-in'); gameTitle.classList.add('animate-intro-out'); }, 4000);
            setTimeout(() => { splash.classList.add('hidden'); mainApp.classList.remove('opacity-0'); }, 4600);
        });

        // Setup Event Listeners
        createBtn.onclick = () => {
            if(!nameInput.value.trim()) { alert("PLEASE ENTER YOUR NAME FIRST!"); return; }
            createRoom();
        };
        joinBtn.onclick = () => {
            if(!nameInput.value.trim()) { alert("PLEASE ENTER YOUR NAME FIRST!"); return; }
            joinRoom(roomInput.value.trim().toUpperCase());
        };
        readyBtn.onclick = (e) => {
            e.stopPropagation();
            set(ref(db, `rooms/${roomCode}/players/${myId}/isReady`), true);
            readyBtn.classList.add('hidden');
            statusText.innerText = "READY! WAITING FOR PEER...";
        };
        rematchBtn.onclick = (e) => {
            e.stopPropagation();
            set(ref(db, `rooms/${roomCode}/players/${myId}/wantsRematch`), true);
            rematchBtn.classList.add('opacity-50', 'pointer-events-none');
            rematchBtn.innerText = "WAITING FOR OPPONENT...";
        };
        window.addEventListener('touchstart', (e) => { if(isGameRunning && !myIsDead && myY === groundY) velocity = jumpStrength; });

        function generateCode() { return Math.random().toString(36).substring(2, 6).toUpperCase(); }

        async function createRoom() {
            roomCode = generateCode();
            isHost = true;
            const roomRef = ref(db, `rooms/${roomCode}`);
            const initialData = {
                obstacleX: 800,
                gameStarted: false,
                players: {}
            };
            initialData.players[myId] = { id: myId, name: nameInput.value.trim().toUpperCase(), x: 50, y: 200, score: 0, isDead: false, isReady: false, wantsRematch: false, role: 'host' };
            
            await set(roomRef, initialData);
            initLobby(roomCode);
            statusText.innerText = "WAITING FOR OPPONENT...";
            listenToRoom();
        }

        async function joinRoom(code) {
            if(!code) return;
            const roomRef = ref(db, `rooms/${code}`);
            const snapshot = await get(roomRef);
            if(!snapshot.exists()) { alert("Room not found!"); return; }
            
            const roomData = snapshot.val();
            if(Object.keys(roomData.players || {}).length >= 2) { alert("Room Full!"); return; }

            roomCode = code;
            isHost = false;
            await set(ref(db, `rooms/${roomCode}/players/${myId}`), { id: myId, name: nameInput.value.trim().toUpperCase(), x: 50, y: 200, score: 0, isDead: false, isReady: false, wantsRematch: false, role: 'peer' });
            initLobby(roomCode);
            listenToRoom();
        }

        function initLobby(code) {
            menu.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            displayCode.innerText = code;
        }

        function listenToRoom() {
            onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                players = data.players || {};
                obstacleX = data.obstacleX;

                const playerIds = Object.keys(players);
                
                // Track Dynamic Rematch Actions
                if (data.gameStarted === false && isGameRunning === false) {
                    const activePlayersList = Object.values(players);
                    if (activePlayersList.length === 2) {
                        const myPlayerNode = players[myId];
                        const opponentPlayerNode = activePlayersList.find(p => p.id !== myId);

                        if (myPlayerNode && opponentPlayerNode) {
                            // Check if opponent requested first
                            if (opponentPlayerNode.wantsRematch && !myPlayerNode.wantsRematch) {
                                rematchBtn.classList.remove('hidden');
                                rematchBtn.innerText = `${opponentPlayerNode.name} WANTS A REMATCH! TAP TO ACCEPT`;
                            } else if (!myPlayerNode.wantsRematch) {
                                rematchBtn.classList.remove('hidden');
                                rematchBtn.innerText = "REQUEST REMATCH";
                            }

                            // Trigger Rematch Session Reset if both parties opted in
                            if (myPlayerNode.wantsRematch && opponentPlayerNode.wantsRematch) {
                                rematchBtn.classList.add('hidden');
                                rematchBtn.classList.remove('opacity-50', 'pointer-events-none');
                                isGameRunning = true;
                                myIsDead = false;
                                myScore = 0;
                                myY = groundY;
                                mobileHint.classList.remove('hidden');
                                statusText.innerText = "🔴 LIVE MATCH";
                                if (isHost) {
                                    update(ref(db, `rooms/${roomCode}`), { gameStarted: true });
                                    // Flush ready configurations safely inside host container
                                    activePlayersList.forEach(p => {
                                        update(ref(db, `rooms/${roomCode}/players/${p.id}`), { wantsRematch: false, isDead: false, score: 0, y: 200 });
                                    });
                                }
                                gameLoop();
                            }
                        }
                    }
                }

                if (playerIds.length === 2 && !isGameRunning && !data.gameStarted) {
                    const allReady = Object.values(players).every(p => p.isReady);
                    
                    // Simple initial ready UI display logic block
                    const myPlayerNode = players[myId];
                    if (myPlayerNode && !myPlayerNode.isReady && !myPlayerNode.wantsRematch) {
                        readyBtn.classList.remove('hidden');
                        statusText.innerText = "PLAYER JOINED. READY UP!";
                    }

                    if (allReady) {
                        isGameRunning = true;
                        myIsDead = false;
                        myScore = 0;
                        myY = groundY;
                        readyBtn.classList.add('hidden');
                        mobileHint.classList.remove('hidden');
                        statusText.innerText = "🔴 LIVE MATCH";
                        if(isHost) update(ref(db, `rooms/${roomCode}`), { gameStarted: true });
                        gameLoop();
                    }
                }

                // Global game over handle
                if (data.gameStarted && Object.values(players).every(p => p.isDead) && isGameRunning) {
                    isGameRunning = false;
                    statusText.innerText = "GAME OVER!";
                    mobileHint.classList.add('hidden');
                    if(isHost) update(ref(db, `rooms/${roomCode}`), { gameStarted: false });
                }
            });
        }

        function gameLoop() {
            if (!isGameRunning) return;

            if (!myIsDead) {
                velocity += gravity;
                myY += velocity;
                if (myY > groundY) { myY = groundY; velocity = 0; }
                myScore++;

                if (obstacleX < 70 && obstacleX > 30 && myY > 170) {
                    myIsDead = true;
                    statusText.innerText = "SPECTATING OPPONENT...";
                }
            }

            // Sync frame variables into database
            update(ref(db, `rooms/${roomCode}/players/${myId}`), { y: myY, score: myScore, isDead: myIsDead });

            // Host recalculates the obstacle's horizontal travel vector
            if (isHost) {
                let nextX = obstacleX - 5;
                if (nextX < -30) nextX = 800 + Math.random() * 150;
                update(ref(db, `rooms/${roomCode}`), { obstacleX: nextX });
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#374151'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, 230); ctx.lineTo(canvas.width, 230); ctx.stroke();

            // Neon Obstacle
            ctx.fillStyle = '#ef4444'; ctx.shadowBlur = 10; ctx.shadowColor = '#ef4444';
            ctx.fillRect(obstacleX, 190, 22, 40);

            // Render active game units
            Object.values(players).forEach(p => {
                const isMe = p.id === myId;
                ctx.fillStyle = isMe ? '#6366f1' : '#10b981';
                ctx.shadowColor = isMe ? '#6366f1' : '#10b981';
                ctx.shadowBlur = p.isDead ? 0 : 12;

                // Explicit fallback string configuration for names if database handles are still structural
                const renderingName = p.name ? p.name : "PLAYER";

                if (!p.isDead) {
                    ctx.fillRect(isMe ? 50 : 90, p.y, 22, 30);
                    ctx.fillStyle = '#9ca3af'; ctx.shadowBlur = 0; ctx.font = 'bold 11px sans-serif';
                    ctx.fillText(`${renderingName}: ${p.score}`, (isMe ? 50 : 90) - 10, p.y - 12);
                } else {
                    ctx.strokeStyle = isMe ? 'rgba(99, 102, 241, 0.25)' : 'rgba(16, 185, 129, 0.25)';
                    ctx.shadowBlur = 0; ctx.strokeRect(isMe ? 50 : 90, 210, 22, 20);
                }
            });
            ctx.shadowBlur = 0;
        }
    </script>
</body>
    </html>
